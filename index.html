<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Guess - Otaku Challenge</title>
    <!-- Google Fonts for English and Thai -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+Thai:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="anime-background">
        <div class="bg-layer bg-layer-1"></div>
        <div class="bg-layer bg-layer-2"></div>
        <div class="bg-overlay"></div>
    </div>

    <div id="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Add an element to handle screen loading dynamically -->
    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
    </div>

    <div id="app" class="glass-panel">
        <header id="app-header">
            <h1 id="app-title">Anime Guess</h1>
            <div class="controls">
                <select id="lang-select">
                    <option value="th" selected>ไทย (TH)</option>
                    <option value="en">English (EN)</option>
                </select>
            </div>
        </header>

        <main id="main-content">
            <!-- Dynamic Content will be injected here by app.js -->
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
